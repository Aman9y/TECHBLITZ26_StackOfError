{% extends "base.html" %}

{% block title %}Queue - SmartClinic OS{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-list-ol"></i> Patient Queue</h2>
        {% if session.role == 'receptionist' %}
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#checkinModal">
            <i class="bi bi-person-check"></i> Check-in Patient
        </button>
        {% endif %}
    </div>
    
    <div class="row">
        <div class="col-md-4">
            <div class="card bg-primary text-white mb-3">
                <div class="card-body text-center">
                    <h5>Now Serving</h5>
                    <h2 id="nowServing">-</h2>
                </div>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h5>Waiting Patients</h5>
                </div>
                <div class="card-body">
                    <div id="queueList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Check-in Modal -->
<div class="modal fade" id="checkinModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Check-in Patient</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="checkinForm">
                    <div class="mb-3">
                        <label for="checkinPatient" class="form-label">Patient</label>
                        <select class="form-select" id="checkinPatient" required></select>
                    </div>
                    <div class="mb-3">
                        <label for="checkinAppointment" class="form-label">Appointment (Optional)</label>
                        <select class="form-select" id="checkinAppointment">
                            <option value="">Walk-in</option>
                        </select>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="isEmergency">
                        <label class="form-check-label" for="isEmergency">
                            Mark as Emergency
                        </label>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="checkinPatient()">Check-in</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const socket = io();
let queue = [];

async function loadQueue() {
    queue = await fetch('/api/queue').then(r => r.json());
    
    const inConsultation = queue.find(q => q.status === 'in_consultation');
    document.getElementById('nowServing').textContent = inConsultation ? inConsultation.patient_name : 'None';
    
    const waiting = queue.filter(q => q.status === 'waiting');
    const html = waiting.map((q, i) => `
        <div class="d-flex justify-content-between align-items-center mb-3 p-3 border rounded ${q.is_emergency ? 'border-danger' : ''}">
            <div>
                <h5 class="mb-0">${i + 1}. ${q.patient_name}</h5>
                <small class="text-muted">Position: ${q.position}</small>
                ${q.is_emergency ? '<span class="badge bg-danger ms-2">Emergency</span>' : ''}
            </div>
            <div>
                {% if session.role == 'doctor' %}
                <button class="btn btn-success" onclick="callPatient(${q.id})">
                    <i class="bi bi-telephone"></i> Call
                </button>
                {% endif %}
                {% if session.role == 'receptionist' %}
                <button class="btn btn-warning btn-sm" onclick="markEmergency(${q.id})">
                    <i class="bi bi-exclamation-triangle"></i>
                </button>
                {% endif %}
            </div>
        </div>
    `).join('');
    document.getElementById('queueList').innerHTML = html || '<p class="text-muted">No patients waiting</p>';
}

async function loadCheckinData() {
    const patients = await fetch('/api/patients').then(r => r.json());
    const patientSelect = document.getElementById('checkinPatient');
    patientSelect.innerHTML = '<option value="">Select Patient</option>' + 
        patients.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    
    const appointments = await fetch('/api/appointments/today').then(r => r.json());
    const appointmentSelect = document.getElementById('checkinAppointment');
    appointmentSelect.innerHTML = '<option value="">Walk-in</option>' + 
        appointments.filter(a => a.status === 'booked').map(a => 
            `<option value="${a.id}">${a.patient_name} - ${a.time}</option>`
        ).join('');
}

async function checkinPatient() {
    const data = {
        patient_id: parseInt(document.getElementById('checkinPatient').value),
        appointment_id: document.getElementById('checkinAppointment').value || null,
        is_emergency: document.getElementById('isEmergency').checked
    };
    
    await fetch('/api/queue/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    
    bootstrap.Modal.getInstance(document.getElementById('checkinModal')).hide();
    document.getElementById('checkinForm').reset();
    loadQueue();
}

async function callPatient(queueId) {
    await fetch(`/api/queue/${queueId}/call`, { method: 'POST' });
    loadQueue();
}

async function markEmergency(queueId) {
    await fetch(`/api/queue/${queueId}/emergency`, { method: 'PUT' });
    loadQueue();
}

socket.on('queue_updated', (data) => {
    loadQueue();
});

document.getElementById('checkinModal')?.addEventListener('show.bs.modal', loadCheckinData);
loadQueue();
</script>
{% endblock %}
