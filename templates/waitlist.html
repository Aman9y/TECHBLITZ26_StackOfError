{% extends "base.html" %}

{% block title %}Waitlist - SmartClinic OS{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-clock-history"></i> Waitlist</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#waitlistModal" onclick="openNewWaitlist()">
            <i class="bi bi-plus-circle"></i> Add to Waitlist
        </button>
    </div>
    
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Patient</th>
                        <th>Phone</th>
                        <th>Doctor</th>
                        <th>Preferred Date</th>
                        <th>Preferred Time</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="waitlistTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Waitlist Modal -->
<div class="modal fade" id="waitlistModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add to Waitlist</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="waitlistForm">
                    <div class="mb-3">
                        <label for="waitlistPatient" class="form-label">Patient</label>
                        <select class="form-select" id="waitlistPatient" required></select>
                    </div>
                    <div class="mb-3">
                        <label for="waitlistDoctor" class="form-label">Doctor</label>
                        <select class="form-select" id="waitlistDoctor" required></select>
                    </div>
                    <div class="mb-3">
                        <label for="waitlistDate" class="form-label">Preferred Date</label>
                        <input type="date" class="form-control" id="waitlistDate" required>
                    </div>
                    <div class="mb-3">
                        <label for="waitlistTime" class="form-label">Preferred Time</label>
                        <input type="time" class="form-control" id="waitlistTime" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addToWaitlist()">Add</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadWaitlist() {
    const waitlist = await fetch('/api/waitlist').then(r => r.json());
    const html = waitlist.map(w => `
        <tr>
            <td>${w.patient_name}</td>
            <td>${w.patient_phone}</td>
            <td>${w.doctor_name}</td>
            <td>${new Date(w.preferred_date).toLocaleDateString()}</td>
            <td>${w.preferred_time}</td>
            <td><span class="badge bg-${w.status === 'waiting' ? 'warning' : 'success'}">${w.status}</span></td>
            <td>
                <button class="btn btn-sm btn-danger" onclick="removeFromWaitlist(${w.id})">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
    document.getElementById('waitlistTable').innerHTML = html || '<tr><td colspan="7" class="text-center text-muted">No entries in waitlist</td></tr>';
}

async function openNewWaitlist() {
    const patients = await fetch('/api/patients').then(r => r.json());
    const doctors = await fetch('/api/doctors').then(r => r.json());
    
    document.getElementById('waitlistPatient').innerHTML = '<option value="">Select Patient</option>' + 
        patients.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    
    document.getElementById('waitlistDoctor').innerHTML = '<option value="">Select Doctor</option>' + 
        doctors.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
}

async function addToWaitlist() {
    const data = {
        patient_id: parseInt(document.getElementById('waitlistPatient').value),
        doctor_id: parseInt(document.getElementById('waitlistDoctor').value),
        preferred_date: document.getElementById('waitlistDate').value,
        preferred_time: `${document.getElementById('waitlistDate').value}T${document.getElementById('waitlistTime').value}`
    };
    
    await fetch('/api/waitlist', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    
    bootstrap.Modal.getInstance(document.getElementById('waitlistModal')).hide();
    loadWaitlist();
}

async function removeFromWaitlist(id) {
    if (!confirm('Remove from waitlist?')) return;
    
    await fetch(`/api/waitlist/${id}`, { method: 'DELETE' });
    loadWaitlist();
}

loadWaitlist();
</script>
{% endblock %}
