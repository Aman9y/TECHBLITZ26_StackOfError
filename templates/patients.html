{% extends "base.html" %}

{% block title %}Patients - SmartClinic OS{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people"></i> Patients</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#patientModal" onclick="openNewPatient()">
            <i class="bi bi-plus-circle"></i> Add Patient
        </button>
    </div>
    
    <div class="card">
        <div class="card-body">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="patientsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Patient Modal -->
<div class="modal fade" id="patientModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Patient</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="patientForm">
                    <input type="hidden" id="patientId">
                    <div class="mb-3">
                        <label for="patientName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="patientName" required>
                    </div>
                    <div class="mb-3">
                        <label for="patientPhone" class="form-label">Phone</label>
                        <input type="tel" class="form-control" id="patientPhone" required>
                    </div>
                    <div class="mb-3">
                        <label for="patientEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="patientEmail">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="savePatient()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function loadPatients() {
    const patients = await fetch('/api/patients').then(r => r.json());
    const html = patients.map(p => `
        <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.phone}</td>
            <td>${p.email || '-'}</td>
            <td>
                <button class="btn btn-sm btn-primary" onclick='editPatient(${JSON.stringify(p)})'>
                    <i class="bi bi-pencil"></i>
                </button>
            </td>
        </tr>
    `).join('');
    document.getElementById('patientsTable').innerHTML = html;
}

function openNewPatient() {
    document.getElementById('modalTitle').textContent = 'Add Patient';
    document.getElementById('patientForm').reset();
    document.getElementById('patientId').value = '';
}

function editPatient(patient) {
    document.getElementById('modalTitle').textContent = 'Edit Patient';
    document.getElementById('patientId').value = patient.id;
    document.getElementById('patientName').value = patient.name;
    document.getElementById('patientPhone').value = patient.phone;
    document.getElementById('patientEmail').value = patient.email || '';
    new bootstrap.Modal(document.getElementById('patientModal')).show();
}

async function savePatient() {
    const id = document.getElementById('patientId').value;
    const data = {
        name: document.getElementById('patientName').value,
        phone: document.getElementById('patientPhone').value,
        email: document.getElementById('patientEmail').value
    };
    
    await fetch(id ? `/api/patients/${id}` : '/api/patients', {
        method: id ? 'PUT' : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });
    
    bootstrap.Modal.getInstance(document.getElementById('patientModal')).hide();
    loadPatients();
}

loadPatients();
</script>
{% endblock %}
